name: Daily AI Video
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: sudo apt update && sudo apt install -y ffmpeg espeak fonts-noto
      - run: pip install -r requirements.txt
      - run: mkdir -p assets output .yt_token
      - run: echo '${{ secrets.YT_CLIENT_SECRET }}' > client_secret.json
      - run: echo '${{ secrets.YT_TOKEN }}' | base64 -d > .yt_token/token.pickle
      - run: python main.py
      - uses: actions/upload-artifact@v4
        with:
          name: video
          path: output/*.mp4
