name: Daily AI Video

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Create assets directory
        run: |
          mkdir -p assets output
          python -c "
from PIL import Image, ImageDraw
img = Image.new('RGB', (1280, 720), (20, 20, 30))
draw = ImageDraw.Draw(img)
draw.rectangle([0, 600, 1280, 720], fill=(30, 30, 50))
try:
    from PIL import ImageFont
    font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 32)
except:
    font = ImageFont.load_default()
draw.text((60, 630), 'Подпишись на канал', fill=(255, 255, 255), font=font)
img.save('assets/bg.png', 'PNG')
print('Background created')
"

      - name: Generate and upload video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python main.py

      - name: Archive video
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/video_*.mp4
          retention-days: 7
